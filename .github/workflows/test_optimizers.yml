name: Test Deterministic Optimizer

on:

  push:
    branches: [main]

jobs:
    test_det_optimizer:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install glpk
              run: |
                sudo apt-get update
                sudo apt-get install -y glpk-utils

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                python-version-file: '.python-version'

            - name: Install uv
              uses: astral-sh/setup-uv@v7

            - name: Install the project for testing
              run: uv sync

            - name: Run tests
              run: |
                source .venv/bin/activate
                pytest scripts/test_deterministic_optimizer.py -v -s
                pytest scripts/test_stochastic_optimizer.py -v -s
            